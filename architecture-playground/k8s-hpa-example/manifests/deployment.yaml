apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-example
  namespace: hpa-example-ns
  labels:
    app: hpa-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-example
  template:
    metadata:
      labels:
        app: hpa-example
    spec:
      containers:
        - name: hpa-example
          image: hpa-example:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hpa-example
  namespace: hpa-example-ns
  labels:
    app: hpa-example
spec:
  selector:
    app: hpa-example
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort
